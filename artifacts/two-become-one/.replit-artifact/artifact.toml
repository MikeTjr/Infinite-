kind = "web"
previewPath = "/"
title = "Two Become One"
version = "1.0.0"
id = "artifacts/two-become-one"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20021

[services.development]
run = "pnpm --filter @workspace/two-become-one run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/two-become-one", "run", "build" ]
publicDir = "artifacts/two-become-one/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20021"
BASE_PATH = "/"
